<!DOCTYPE html>
<html lang="tr">
    {% load static %}

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videolar</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'css/video_list.css' %}">
</head>
<body>

<div class="container mt-5">
    <h1>Tüm Videolar</h1>
    
    <!-- Videoların listelendiği alan -->
    <table class="table">
        <thead>
            <tr>
                <th scope="col">Video Adı</th>
                <th scope="col">Yüklenme Tarihi</th>
                <th scope="col">Video Açıklaması</th>
                <th scope="col">İşlem</th>
            </tr>
        </thead>
        <tbody>
            {% for video in videos %}
                <tr>
                    <td>{{ video.title }}</td>
                    <td>{{ video.upload_date }}</td>
                    <td>{{ video.description }}</td>
                    <td>
                        <a href="{% url 'video_report' video.id %}" class="btn btn-info">Rapor</a>
                        
                        <!-- Silme Butonu -->
                        <form action="{% url 'delete_video' video.id %}" method="post" style="display:inline;">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-danger">Sil</button>
                        </form>
                    </td>
                </tr>
            {% endfor %}
        </tbody>
    </table>

    <a href="{% url 'upload_video' %}" class="btn btn-primary">Yeni Video Yükle</a>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.0.7/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
